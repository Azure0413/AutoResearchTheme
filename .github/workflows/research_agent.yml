name: Daily Research Agent
on:
  schedule:
    # 大幅放寬 cron 視窗 — 因為 GitHub Actions cron 在尖峰時段常被跳過
    # 從台灣時間 01:12 ~ 12:42 連續嘗試,每 30 分鐘一次,共 24 次機會
    # 5 階段最多只需要 5 次成功,所以即使被跳過 70% 也跑得完
    #
    # 拆成兩段 cron 是因為這個時間範圍會跨 UTC 換日
    - cron: '12,42 17-23 * * *'   # UTC 17:12 ~ 23:42 = 台灣 01:12 ~ 07:42(隔日)
    - cron: '12,42 0-4 * * *'     # UTC 00:12 ~ 04:42 = 台灣 08:12 ~ 12:42(當日)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: research-agent
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run agent
        id: run_agent
        continue-on-error: true
        env:
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python agent.py

      - name: Commit and push (with retry)
        if: always()
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"

          git add state.json reports/ 2>/dev/null || true
          [ -f topic_history.json ] && git add topic_history.json

          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: agent stage update [skip ci]"

          for i in 1 2 3; do
            echo "Push attempt $i..."
            if git pull --rebase origin ${{ github.ref_name }} && git push; then
              echo "✓ Pushed successfully on attempt $i"
              exit 0
            fi
            echo "Attempt $i failed, will retry in 5s..."
            sleep 5
          done

          echo "::error::Failed to push after 3 attempts"
          exit 1

      - name: Mark workflow failed if agent failed
        if: steps.run_agent.outcome == 'failure'
        run: |
          echo "::error::Agent step failed — check Discord for details"
          exit 1
