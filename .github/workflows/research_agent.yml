name: Daily Research Agent
on:
  schedule:
    - cron: '12,42 17-21 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: research-agent
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    # 整個 job 最多跑 20 分鐘(防止 agent 卡死無限佔資源)
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run agent
        id: run_agent
        # 即使 agent.py 噴錯也要繼續跑 commit 步驟 — 我們把錯誤訊息寫進 state.json
        # 讓失敗計數能推到遠端,下次才會自動降級
        continue-on-error: true
        env:
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python agent.py

      - name: Commit and push (with retry)
        # if: always() 確保即使 agent 失敗也會嘗試 commit(把失敗計數推上去)
        if: always()
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"

          git add state.json reports/ 2>/dev/null || true
          [ -f topic_history.json ] && git add topic_history.json

          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: agent stage update [skip ci]"

          # Push 失敗時最多重試 3 次 — 解決多個 workflow 同時 push 的競爭問題
          for i in 1 2 3; do
            echo "Push attempt $i..."
            if git pull --rebase origin ${{ github.ref_name }} && git push; then
              echo "✓ Pushed successfully on attempt $i"
              exit 0
            fi
            echo "Attempt $i failed, will retry in 5s..."
            sleep 5
          done

          echo "::error::Failed to push after 3 attempts"
          exit 1

      # 如果 agent 步驟失敗,讓整個 workflow 也標記為失敗(方便你在 Actions 頁面看到)
      - name: Mark workflow failed if agent failed
        if: steps.run_agent.outcome == 'failure'
        run: |
          echo "::error::Agent step failed — check Discord for details"
          exit 1
