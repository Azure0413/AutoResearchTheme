name: Daily Research Agent
on:
  schedule:
    # 台灣時間 01:00, 02:00, 03:00, 04:00, 05:00 = UTC 17:00, 18:00, 19:00, 20:00, 21:00 (前一天)
    - cron: '0 17,18,19,20,21 * * *'
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: research-agent
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run agent
        env:
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python agent.py
      - name: Commit and push
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git add state.json topic_history.json reports/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: agent stage update [skip ci]"
            git pull --rebase origin ${{ github.ref_name }} || true
            git push
          fi
